  # 第五批：通用 gift_context 送礼场景识别字典（三类：意图 / 时机 / 对象）。
  # 全部查表，不做 LLM 语义推断；缺该节点时引擎 Crash Early（见 understanding/gift_context.py）。
  # 不是父亲节/爸爸特例：父亲节/爸爸只是 hla 样本证据，框架对任意送礼对象/时机/意图通用生效。
  # 注意：避免过短关键词（如单字），防止在标题/ASR 中误触发。
  gift_context:
    # 送礼意图（intent）：命中即视为存在送礼信号之一。
    intent_keywords:
      - 送礼
      - 礼物
      - 礼盒
      - 礼赠
      - 送给
      - 买给
      - 给他
      - 给她
      - 给爸妈
      - 给长辈
      - 不出错
      - 体面
      - 有面子
      - 拿得出手
      - 心意
      - 仪式感
    # 送礼时机（scene）：每个 scene 含 keywords；可选 implies_recipient（时机隐含的受礼者）。
    # scenes 列表顺序即匹配优先级：先出现的 scene 优先命中。
    scenes:
      - scene: 父亲节
        keywords: [父亲节]
        implies_recipient: 爸爸
      - scene: 母亲节
        keywords: [母亲节]
        implies_recipient: 妈妈
      - scene: 生日
        keywords: [生日, 过生日, 生日礼物]
      - scene: 七夕情人节
        keywords: [七夕, 情人节, "520"]
        implies_recipient: 伴侣
      - scene: 春节过年
        keywords: [春节, 过年, 年货, 新年礼物]
      - scene: 中秋端午
        keywords: [中秋, 端午]
      - scene: 教师节
        keywords: [教师节]
        implies_recipient: 老师
      - scene: 毕业开学季
        keywords: [毕业季, 开学季]
      - scene: 拜访探亲
        keywords: [结婚, 乔迁, 探亲, 拜访]
      - scene: 纪念日节日
        keywords: [纪念日, 节日礼物]
    # 送礼对象（recipient）：每个 recipient 含 keywords + 受礼者画像 + 购买决策者 + 关系。
    # recipients 列表顺序即匹配优先级：先出现的 recipient 优先命中。
    recipients:
      - recipient: 爸爸
        demographic: 中年男性
        purchase_decider: 成年子女
        relationship: 子女送父亲
        keywords: [爸爸, 父亲, 老爸, 爸比, 老爹]
      - recipient: 妈妈
        demographic: 中年女性
        purchase_decider: 成年子女
        relationship: 子女送母亲
        keywords: [妈妈, 母亲, 老妈, 妈咪]
      - recipient: 伴侣
        demographic: 青年
        purchase_decider: 伴侣
        relationship: 伴侣互赠
        keywords: [男朋友, 女朋友, 男友, 女友, 对象, 伴侣, 老公, 老婆, 先生, 太太]
      - recipient: 孩子
        demographic: 儿童青少年
        purchase_decider: 家人
        relationship: 家庭送礼
